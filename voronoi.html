<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Voronoi Activation</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #1e1e24;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      border: 2px solid #fff;
      background-color: #111;
      cursor: crosshair;
    }
  </style>
</head>
<body>

<canvas id="artboard" width="800" height="400"></canvas>

<script>
  const canvas = document.getElementById("artboard");
  const ctx = canvas.getContext("2d");

  // 1. Same 12 static points
  const points = [
    [100, 200], [150, 130], [220, 270], 
    [300, 100], [350, 300], [420, 120], 
    [500, 280], [580, 100], [650, 250], 
    [700, 150], [750, 220], [800, 200]
  ];

  const delaunay = d3.Delaunay.from(points);
  const voronoi = delaunay.voronoi([0, 0, 800, 400]);

  const colors = ["#ff595e", "#ffca3a", "#8ac926", "#1982c4", "#6a4c93"];

  // Track which cell index is currently "active" (-1 means none)
  let activeIndex = -1;

  // --- [SPOT 1] Sequence Trackers ---
  const sequence = [0, 5, 10, 2, 7, 11, 4, 8, 1, 6, 3, 9];
  let currentTrialIndex = 0; 

  window.delaunay;
  window.activeIndex = activeIndex;
  window.drawVoronoi = draw;
  window.attemptAcquisition = attemptAcquisition;

  // 2. Wrap drawing inside a function so we can redraw on hover
  function draw() {
    ctx.clearRect(0, 0, 800, 400);

    // Reset shadow blur baseline
    ctx.shadowBlur = 0;

    for (let i = 0; i < points.length; i++) {
      const polygon = voronoi.cellPolygon(i);
      if (!polygon) continue;

      ctx.beginPath();
      ctx.moveTo(polygon[0][0], polygon[0][1]);
      for (let j = 1; j < polygon.length; j++) {
        ctx.lineTo(polygon[j][0], polygon[j][1]);
      }
      ctx.closePath();

      // --- [SPOT 2] Traffic Light Cell Highlighting ---
      const currentTargetIndex = sequence[currentTrialIndex];
      const nextTargetIndex = sequence[currentTrialIndex + 1];
      const sequencePosition = sequence.indexOf(i);

      ctx.save(); // Isolate canvas shadow glows to this cell only

      if (i === currentTargetIndex) {
        // 🟢 Current Target (Green)
        ctx.fillStyle = 'rgba(100, 255, 100, 0.4)';
        ctx.strokeStyle = 'rgba(100, 255, 100, 1)';
        ctx.lineWidth = 5;
        if (i === activeIndex) {
          ctx.shadowBlur = 25;
          ctx.shadowColor = 'rgba(100, 255, 100, 1)';
        } else {
          ctx.shadowBlur = 10;
          ctx.shadowColor = 'rgba(100, 255, 100, 0.5)';
        }
      } 
      else if (sequencePosition !== -1 && sequencePosition < currentTrialIndex) {
        // 🔴 Completed Target (Red)
        ctx.fillStyle = 'rgba(255, 100, 100, 0.15)';
        ctx.strokeStyle = 'rgba(255, 100, 100, 0.4)';
        ctx.lineWidth = 2;
      } 
      else if (i === nextTargetIndex) {
        // 🟡 Next Target Preview (Yellow)
        ctx.fillStyle = 'rgba(255, 200, 100, 0.2)';
        ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(255, 200, 100, 0.4)';
      } 
      else {
        // ⚪ Inactive Targets (Gray)
        ctx.fillStyle = 'rgba(150, 150, 150, 0.05)';
        ctx.strokeStyle = 'rgba(150, 150, 150, 0.15)';
        ctx.lineWidth = 1;
      }

      ctx.fill();
      ctx.stroke();
      ctx.restore(); // Cleanly clear glows for the next cells
    }

    // --- [SPOT 3] Dynamic Generator Dots ---
    const currentTargetIndex = sequence[currentTrialIndex];
    const nextTargetIndex = sequence[currentTrialIndex + 1];

    for (let i = 0; i < points.length; i++) {
      ctx.beginPath();
      
      let radius = 4;
      let fillStyle = "rgba(150, 150, 150, 0.4)";

      if (i === currentTargetIndex) {
        radius = i === activeIndex ? 10 : 7;
        fillStyle = "#64ff64"; // Green active dot
      } else if (sequence.indexOf(i) < currentTrialIndex) {
        radius = 4;
        fillStyle = "rgba(255, 100, 100, 0.5)"; // Red completed dot
      } else if (i === nextTargetIndex) {
        radius = 5;
        fillStyle = "rgba(255, 200, 100, 0.8)"; // Yellow upcoming dot
      }

      ctx.arc(points[i][0], points[i][1], radius, 0, Math.PI * 2);
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }
  }

  // Action hook to register a hit and advance the layout index
  function attemptAcquisition() {
    const currentTargetIndex = sequence[currentTrialIndex];
    if (activeIndex === currentTargetIndex) {
      console.log(`🎯 Target acquired at index: ${currentTargetIndex}!`);
      currentTrialIndex = (currentTrialIndex + 1) % sequence.length; // Loop sequence back to start
      draw();
    }
  }

  // 3. Listen to the cursor (Mouse) movements
  canvas.addEventListener("mousemove", (event) => {
    // Get cursor coordinates relative to the canvas bounds
    const rect = canvas.getBoundingClientRect();
    const cursorX = event.clientX - rect.left;
    const cursorY = event.clientY - rect.top;

    // MAGIC LINE: Find the closest cell to the cursor!
    activeIndex = delaunay.find(cursorX, cursorY);

    // Redraw the canvas with the updated active index
    draw();
  });

  // Reset when the cursor leaves the canvas
  canvas.addEventListener("mouseleave", () => {
    activeIndex = -1;
    draw();
  });

  // Tap mouse to capture target
  canvas.addEventListener("click", attemptAcquisition);

  // Press SPACE to capture target
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault(); // Stop window scrolling
      attemptAcquisition();
    }
  });

  // Mock head pose for testing — simulates what tracking.js would provide
  function mockHeadPose(yaw, pitch) {
    const canvasWidth = 800;
    const canvasHeight = 400;
    const maxYaw = 30;
    const maxPitch = 20;

    const x = ((yaw / maxYaw) + 0.5) * canvasWidth;
    const y = ((pitch / maxPitch) + 0.5) * canvasHeight;

    activeIndex = delaunay.find(x, y);
    draw();
  }

  // Initial draw on page load
  draw();
</script>
</body>
</html>
